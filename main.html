<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width=device-width, intial-scale=1.0">
        <link href = "mainStyle.css" rel = "stylesheet" type = "text/css">
        <title>Risk Profile Test</title>
    </head>
    <body>
        <div class = "main-container">

            <div class = "question-card">
                <div class = "question-row">
                    <span class = "question-label">Question 1</span>
                    <div class = "progress-ring">
                        <span class = "progress-counter">1/6</span>
                    </div>
                </div>

                <div class = "question-container">
                    <p class = "question-text">Insert question here</p>
                </div>

            </div>

            <form class = "choices-container">

                <label class = "choice">
                    <span class = "choice-box">A</span>
                    <span class = "choice-text">Choice 1</span>
                    <input type = "radio" name = "answer" value = "A">
                </label>

                <label class = "choice">
                    <span class = "choice-box">B</span>
                    <span class = "choice-text">Choice 2</span>
                    <input type = "radio" name = "answer" value = "B">
                </label>

                <label class = "choice">
                    <span class = "choice-box">C</span>
                    <span class = "choice-text">Choice 3</span>
                    <input type = "radio" name = "answer" value = "C">
                </label>

                <label class = "choice">
                    <span class = "choice-box">D</span>
                    <span class = "choice-text">Choice 4</span>
                    <input type = "radio" name = "answer" value = "D">
                </label>

                <div class = "submit-container">
                    <button type = "submit">Submit Answer</button>
                </div>
                
            </form>
        </div>
    </body>
</html>
